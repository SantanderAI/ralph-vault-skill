name: Bug report
description: Report a problem with the skill or the gv.py CLI
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include any
        secrets, internal URLs, or proprietary content in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `gv.py validate`, it ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps so we can reproduce the issue.
      placeholder: |
        1. Run `...`
        2. See error `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA you are running.
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Agent / environment
      description: Where are you running the skill?
      options:
        - Claude
        - Codex
        - Gemini
        - CLI only (gv.py)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output (redact sensitive data).
      render: shell
