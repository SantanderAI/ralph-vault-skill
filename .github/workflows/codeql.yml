#
# Static analysis with GitHub CodeQL.
# Replace `@v3` action references with SHA digests before publishing.

name: CodeQL

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    - cron: "23 6 * * 1"  # weekly Monday 06:23 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    # SARIF upload needs GitHub Advanced Security, which is not available on
    # private repos under this enterprise. Skip while private; activates
    # automatically once the repo is flipped to public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@662472033e021d55d94146f66f6058822b0b39fd  # v3.27.0
        with:
          languages: python
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@662472033e021d55d94146f66f6058822b0b39fd  # v3.27.0
        with:
          category: "/language:python"
