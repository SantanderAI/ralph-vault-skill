#
# Lint + format + type-check + tests + coverage.
# ralph-vault-skill is a stdlib-only CLI (scripts/gv.py) — not a packaged
# distribution — so the dev tooling is installed directly rather than via a
# package extra, and tests import `gv` through tests/conftest.py (sys.path).
#
# NOTE: before publishing, replace every `@v<N>` action reference with the
#       corresponding 40-char commit SHA (use `pin-github-action`).

name: CI

on:
  push:
    branches: [main, development]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
      - name: Ruff
        run: ruff check .
      - name: Black --check
        run: black --check .
      - name: Mypy
        run: mypy scripts

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: pytest --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
