#
# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# NOTE: ralph-vault-skill has no third-party runtime dependencies (stdlib-only
# CLI). The pip ecosystem entry tracks the dev tooling pins, and the
# github-actions entry keeps workflow action SHAs fresh.

version: 2
updates:
  # Python dev tooling (ruff/black/mypy/pytest) — pinned in CI.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by workflows in .github/workflows/
  # Dependabot keeps SHA pins fresh and bumps the human-readable version comment.
  # Grouped so a single PR covers all minor/patch action bumps.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      gha-minor-patch:
        update-types:
          - minor
          - patch
