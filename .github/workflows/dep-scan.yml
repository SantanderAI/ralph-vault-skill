#
# Dependency vulnerability scan with pip-audit.
# ralph-vault-skill has no third-party runtime dependencies (stdlib-only), so
# this audits the resolved environment as a safety net and guards against any
# future dependency creep.
# Replace action references with SHA digests before publishing.

name: Dependency scan

on:
  push:
    branches: [main, development]
  pull_request:
  schedule:
    - cron: "37 4 * * *"  # daily 04:37 UTC

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266  # v1.1.0
        with:
          local: true
          vulnerability-service: osv
